---
title: Шпаргалка по Jekyll
---

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
  </head>

  <body>
    <h1>{{ page.title | upcase }}</h1>
    <h2>Авторы</h2>
    <ul>
      {% for author in site.authors %}
      <li>{{ author }}</li>
      {% endfor %}
    </ul>
  </body>
</html>
