<nav>
  <ul class="navigation">
    {% for item in site.data.navigation %}
      <li class="navigation__item">
        <span>{{ forloop.index }}</span>
        <a href="{{ item.link | relative_url }}" class="transition-sm" >
        {{ item.name }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
